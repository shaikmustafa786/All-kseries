<!DOCTYPE html>
<html>

<head>

    <title>Admin Login</title>

</head>

<body>

<h1 style="text-align:center;">
🔐 Admin Login
</h1>

<form action="/admin_login" method="POST" style="width:350px;margin:auto;">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
        style="width:100%;padding:10px;">

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
        style="width:100%;padding:10px;">

    <br><br>

    <button type="submit" style="width:100%;padding:10px;">
        Login
    </button>

</form>

</body>

</html>
