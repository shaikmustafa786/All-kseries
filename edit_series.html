<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Edit Series</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1 style="text-align:center;">
✏️ Edit Series
</h1>

<form action="/update_series" method="POST" enctype="multipart/form-data" style="width:500px;margin:auto;">

    <input
        type="hidden"
        name="series_id"
        value="{{ series[0] }}">

    <label>Series Name</label>

    <br><br>

    <input
        type="text"
        name="name"
        value="{{ series[1] }}"
        required
        style="width:100%;padding:10px;">

    <br><br>

    <label>Description</label>

    <br><br>

    <textarea
        name="description"
        rows="6"
        style="width:100%;">{{ series[2] }}</textarea>

    <br><br>

    <label>New Thumbnail (Optional)</label>

    <br><br>

    <input
        type="file"
        name="thumbnail">

    <br><br>

    <button type="submit">
        💾 Save Changes
    </button>

</form>

</body>

</html>
