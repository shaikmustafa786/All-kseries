<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Video App</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header style="text-align:center;padding:20px;background:#ff4d6d;color:white;">

    <h1>🎬 My Video App</h1>
    <br><br>

<a href="/dashboard">
    <button style="background:#28a745;color:white;">
        📊 Dashboard
    </button>
</a>

    <br>

    <a href="/upload_series">
        <button style="padding:10px 20px;font-size:16px;">
            ➕ Upload New Series
        </button>
    </a>

    <a href="/upload_episode">
        <button style="padding:10px 20px; margin-left:10px;">
            🎬 Add New Episode
        </button>
    </a>
</header>

<br>

<h2 style="text-align:center;">
    All Series
</h2>
<div style="text-align:center;margin:20px;">

    <input
        type="text"
        id="searchBox"
        placeholder="🔍 Search Series..."
        style="
            width:350px;
            padding:12px;
            border-radius:8px;
            border:none;
            font-size:16px;
        ">

</div>

<div class="series-container">

{% for series in series_list %}
    
<div class="series-card" data-name="{{ series.name }}">

    {% if series.thumbnail %}

    <img
        src="{{ url_for('static', filename='series_thumbnails/' + series.thumbnail) }}"
        width="280"
        height="170"
        style="border-radius:8px;"
    >

    {% else %}

    <img
        src="https://via.placeholder.com/280x170?text=No+Thumbnail"
        width="280"
        height="170"
    >

    {% endif %}

    <br><br>

    <h3>{{ series.name }}</h3>

    <p>{{ series.description }}</p>

    <br>

    <a href="/series/{{ series.id }}">
        <button style="padding:10px 20px;">
            ▶ Open Series
        </button>
    </a>
    <br><br>

    {% if series.pinned == 0 %}

    <a href="/pin_series/{{ series.id }}">
        <button style="background:gold;color:black;">
            📌 Pin Series
        </button>
    </a>
    
    {% else %}
    
    <a href="/pin_series/{{ series.id }}">
        <button style="background:gray;color:white;">
            📍 Unpin Series
        </button>
    </a>
    
    {% endif %}
    
    <br><br>
    
    <a href="/edit_series/{{ series.id }}">
        <button style="background:#2196F3;color:white;">
            ✏️ Edit Series
        </button>
    </a>
    <br><br>

    <a href="/delete_series/{{ series.id }}"
       onclick="return confirm('Delete this series? All episodes will also be deleted.')">

        <button style="background:red;color:white;">
            🗑 Delete Series
        </button>

    </a>
</div>

{% endfor %}

</div>

<script>

    const searchBox = document.getElementById("searchBox");
    
    searchBox.addEventListener("keyup", function(){
    
        let value = this.value.toLowerCase();
    
        let cards = document.querySelectorAll(".series-card");
    
        cards.forEach(function(card){
    
            let name = card.dataset.name.toLowerCase();
    
            if(name.includes(value)){
    
                card.style.display="block";
    
            }else{
    
                card.style.display="none";
    
            }
    
        });
    
    });
    
    </script>
</body>

</html>
