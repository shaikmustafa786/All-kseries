<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Series</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h1 style="text-align:center;">Upload New Series</h1>

<form action="/add_series" method="POST" enctype="multipart/form-data">

    <p>Series Name</p>
    <input
        type="text"
        name="name"
        placeholder="Enter Series Name"
        required
    >

    <br><br>

    <p>Description</p>
    <textarea
        name="description"
        placeholder="Enter Description"
        rows="5"
    ></textarea>

    <br><br>

    <p>Series Thumbnail</p>
    <input
        type="file"
        name="thumbnail"
        accept="image/*"
        required
    >

    <br><br>

    <button type="submit">
        Upload Series
    </button>

</form>

<br>

<div style="text-align:center;">
    <a href="/">
        Back To Home
    </a>
</div>

</body>
</html>
